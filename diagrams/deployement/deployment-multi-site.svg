<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Déploiement multi-sites</title>
  <desc id="desc">Extension prévue pour plusieurs agents et infrastructures.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#38D6C6"/>
    </marker>
    <marker id="arrow-muted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#9FB0C5"/>
    </marker>
    <style>
      .title { font: 700 42px Inter, Segoe UI, Arial, sans-serif; fill: #E8EEF7; }
      .subtitle { font: 400 19px Inter, Segoe UI, Arial, sans-serif; fill: #9FB0C5; }
      .section { font: 700 22px Inter, Segoe UI, Arial, sans-serif; fill: #E8EEF7; }
      .label { font: 650 20px Inter, Segoe UI, Arial, sans-serif; fill: #E8EEF7; }
      .small { font: 400 16px Inter, Segoe UI, Arial, sans-serif; fill: #9FB0C5; }
      .tiny { font: 500 14px Inter, Segoe UI, Arial, sans-serif; fill: #9FB0C5; }
      .box { fill: #111B2E; stroke: #22324A; stroke-width: 2; rx: 22; }
      .box2 { fill: #16243A; stroke: #22324A; stroke-width: 2; rx: 18; }
      .accent-box { fill: #111B2E; stroke: #38D6C6; stroke-width: 3; rx: 22; }
      .line { fill: none; stroke: #38D6C6; stroke-width: 4; marker-end: url(#arrow); }
      .line-muted { fill: none; stroke: #9FB0C5; stroke-width: 3; marker-end: url(#arrow-muted); }
      .dash { fill: none; stroke: #38D6C6; stroke-width: 3; stroke-dasharray: 10 10; marker-end: url(#arrow); }
      .node { fill: #38D6C6; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#0B1220"/>
  <text x="80" y="80" class="title">Déploiement multi-sites</text>
  <text x="80" y="118" class="subtitle">Extension prévue pour plusieurs agents et infrastructures.</text>
<rect x="80" y="225" width="300" height="145" class="box" filter="url(#shadow)"/><text x="230.0" y="269" text-anchor="middle" class="label">Site A</text><text x="230.0" y="300" text-anchor="middle" class="small">Agent local</text><rect x="80" y="440" width="300" height="145" class="box" filter="url(#shadow)"/><text x="230.0" y="484" text-anchor="middle" class="label">Site B</text><text x="230.0" y="515" text-anchor="middle" class="small">Agent local</text><rect x="80" y="655" width="300" height="145" class="box" filter="url(#shadow)"/><text x="230.0" y="699" text-anchor="middle" class="label">Site C</text><text x="230.0" y="730" text-anchor="middle" class="small">Agent local</text><rect x="600" y="350" width="400" height="250" class="accent-box" filter="url(#shadow)"/><text x="800.0" y="394" text-anchor="middle" class="label">Point de convergence</text><text x="800.0" y="425" text-anchor="middle" class="small">Collecte · Normalisation</text><text x="800.0" y="448" text-anchor="middle" class="small">Sécurité · Routage</text><rect x="1220" y="350" width="300" height="250" class="box" filter="url(#shadow)"/><text x="1370.0" y="394" text-anchor="middle" class="label">Vision central</text><text x="1370.0" y="425" text-anchor="middle" class="small">Santé multi-sites</text><text x="1370.0" y="448" text-anchor="middle" class="small">Timeline consolidée</text><path d="M380 297 C500 297 500 410 600 410" class="line"/><path d="M380 512 H600" class="line"/><path d="M380 727 C500 727 500 540 600 540" class="line"/><path d="M1000 475 H1220" class="line"/>
      <line x1="80" y1="842" x2="1520" y2="842" stroke="#22324A" stroke-width="2"/>
      <text x="80" y="874" class="tiny">Ohana Platform · Architecture de référence</text>
      <text x="1520" y="874" text-anchor="end" class="tiny">Version 1.0</text>
    </svg>
    