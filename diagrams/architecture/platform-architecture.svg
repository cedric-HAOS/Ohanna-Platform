<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Architecture de la plateforme</title>
  <desc id="desc">Vue logique en couches de l’écosystème Ohana.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#38D6C6"/>
    </marker>
    <marker id="arrow-muted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#9FB0C5"/>
    </marker>
    <style>
      .title { font: 700 42px Inter, Segoe UI, Arial, sans-serif; fill: #E8EEF7; }
      .subtitle { font: 400 19px Inter, Segoe UI, Arial, sans-serif; fill: #9FB0C5; }
      .section { font: 700 22px Inter, Segoe UI, Arial, sans-serif; fill: #E8EEF7; }
      .label { font: 650 20px Inter, Segoe UI, Arial, sans-serif; fill: #E8EEF7; }
      .small { font: 400 16px Inter, Segoe UI, Arial, sans-serif; fill: #9FB0C5; }
      .tiny { font: 500 14px Inter, Segoe UI, Arial, sans-serif; fill: #9FB0C5; }
      .box { fill: #111B2E; stroke: #22324A; stroke-width: 2; rx: 22; }
      .box2 { fill: #16243A; stroke: #22324A; stroke-width: 2; rx: 18; }
      .accent-box { fill: #111B2E; stroke: #38D6C6; stroke-width: 3; rx: 22; }
      .line { fill: none; stroke: #38D6C6; stroke-width: 4; marker-end: url(#arrow); }
      .line-muted { fill: none; stroke: #9FB0C5; stroke-width: 3; marker-end: url(#arrow-muted); }
      .dash { fill: none; stroke: #38D6C6; stroke-width: 3; stroke-dasharray: 10 10; marker-end: url(#arrow); }
      .node { fill: #38D6C6; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#0B1220"/>
  <text x="80" y="80" class="title">Architecture de la plateforme</text>
  <text x="80" y="118" class="subtitle">Vue logique en couches de l’écosystème Ohana.</text>
<rect x="260" y="170" width="1080" height="82" class="box" filter="url(#shadow)"/><text x="800.0" y="214" text-anchor="middle" class="label">Utilisateurs</text><text x="800.0" y="245" text-anchor="middle" class="small">Exploitation · Administration · Décision</text><path d="M800 252 V285" class="line"/><rect x="260" y="285" width="1080" height="82" class="box" filter="url(#shadow)"/><text x="800.0" y="329" text-anchor="middle" class="label">Ohana Vision</text><text x="800.0" y="360" text-anchor="middle" class="small">Dashboard · Timeline · Santé · Topologie</text><path d="M800 367 V400" class="line"/><rect x="260" y="400" width="1080" height="82" class="box" filter="url(#shadow)"/><text x="800.0" y="444" text-anchor="middle" class="label">Interfaces</text><text x="800.0" y="475" text-anchor="middle" class="small">API · Temps réel · Contrats publics</text><path d="M800 482 V515" class="line"/><rect x="260" y="515" width="1080" height="82" class="accent-box" filter="url(#shadow)"/><text x="800.0" y="559" text-anchor="middle" class="label">Ohana Agent</text><text x="800.0" y="590" text-anchor="middle" class="small">Runtime · Scheduler · Event Bus · Export</text><path d="M800 597 V630" class="line"/><rect x="260" y="630" width="1080" height="82" class="box" filter="url(#shadow)"/><text x="800.0" y="674" text-anchor="middle" class="label">Plugins et capacités</text><text x="800.0" y="705" text-anchor="middle" class="small">DNS · DHCP · NTP · MQTT · Supervision</text><path d="M800 712 V745" class="line"/><rect x="260" y="745" width="1080" height="82" class="box" filter="url(#shadow)"/><text x="800.0" y="789" text-anchor="middle" class="label">Infrastructure</text><text x="800.0" y="820" text-anchor="middle" class="small">Nœuds · Services · Réseau · Équipements</text>
      <line x1="80" y1="842" x2="1520" y2="842" stroke="#22324A" stroke-width="2"/>
      <text x="80" y="874" class="tiny">Ohana Platform · Architecture de référence</text>
      <text x="1520" y="874" text-anchor="end" class="tiny">Version 1.0</text>
    </svg>
    