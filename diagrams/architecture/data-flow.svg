<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Flux de données global</title>
  <desc id="desc">Vue synthétique du parcours des données dans Ohana.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#38D6C6"/>
    </marker>
    <marker id="arrow-muted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#9FB0C5"/>
    </marker>
    <style>
      .title { font: 700 42px Inter, Segoe UI, Arial, sans-serif; fill: #E8EEF7; }
      .subtitle { font: 400 19px Inter, Segoe UI, Arial, sans-serif; fill: #9FB0C5; }
      .section { font: 700 22px Inter, Segoe UI, Arial, sans-serif; fill: #E8EEF7; }
      .label { font: 650 20px Inter, Segoe UI, Arial, sans-serif; fill: #E8EEF7; }
      .small { font: 400 16px Inter, Segoe UI, Arial, sans-serif; fill: #9FB0C5; }
      .tiny { font: 500 14px Inter, Segoe UI, Arial, sans-serif; fill: #9FB0C5; }
      .box { fill: #111B2E; stroke: #22324A; stroke-width: 2; rx: 22; }
      .box2 { fill: #16243A; stroke: #22324A; stroke-width: 2; rx: 18; }
      .accent-box { fill: #111B2E; stroke: #38D6C6; stroke-width: 3; rx: 22; }
      .line { fill: none; stroke: #38D6C6; stroke-width: 4; marker-end: url(#arrow); }
      .line-muted { fill: none; stroke: #9FB0C5; stroke-width: 3; marker-end: url(#arrow-muted); }
      .dash { fill: none; stroke: #38D6C6; stroke-width: 3; stroke-dasharray: 10 10; marker-end: url(#arrow); }
      .node { fill: #38D6C6; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#0B1220"/>
  <text x="80" y="80" class="title">Flux de données global</text>
  <text x="80" y="118" class="subtitle">Vue synthétique du parcours des données dans Ohana.</text>
<rect x="80" y="340" width="240" height="160" class="box" filter="url(#shadow)"/><text x="200.0" y="384" text-anchor="middle" class="label">Infrastructure</text><text x="200.0" y="415" text-anchor="middle" class="small">Services et équipements</text><rect x="400" y="340" width="240" height="160" class="box" filter="url(#shadow)"/><text x="520.0" y="384" text-anchor="middle" class="label">Plugin</text><text x="520.0" y="415" text-anchor="middle" class="small">Contrôle une capacité</text><rect x="720" y="340" width="240" height="160" class="accent-box" filter="url(#shadow)"/><text x="840.0" y="384" text-anchor="middle" class="label">Agent</text><text x="840.0" y="415" text-anchor="middle" class="small">Produit et publie</text><rect x="1040" y="220" width="240" height="140" class="box" filter="url(#shadow)"/><text x="1160.0" y="264" text-anchor="middle" class="label">Santé</text><text x="1160.0" y="295" text-anchor="middle" class="small">Évalue</text><rect x="1040" y="430" width="240" height="140" class="box" filter="url(#shadow)"/><text x="1160.0" y="474" text-anchor="middle" class="label">Timeline</text><text x="1160.0" y="505" text-anchor="middle" class="small">Historise</text><rect x="1360" y="340" width="170" height="160" class="box" filter="url(#shadow)"/><text x="1445.0" y="384" text-anchor="middle" class="label">Vision</text><text x="1445.0" y="415" text-anchor="middle" class="small">Visualise</text><path d="M320 420 H400" class="line"/><path d="M640 420 H720" class="line"/><path d="M960 390 C990 390 1000 290 1040 290" class="line"/><path d="M960 450 C990 450 1000 500 1040 500" class="line"/><path d="M1280 290 C1330 290 1320 390 1360 390" class="line"/><path d="M1280 500 C1330 500 1320 450 1360 450" class="line"/>
      <line x1="80" y1="842" x2="1520" y2="842" stroke="#22324A" stroke-width="2"/>
      <text x="80" y="874" class="tiny">Ohana Platform · Architecture de référence</text>
      <text x="1520" y="874" text-anchor="end" class="tiny">Version 1.0</text>
    </svg>
    