<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Écosystème Ohanna</title>
  <desc id="desc">Produits, responsabilités et relations de référence.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#38D6C6"/>
    </marker>
    <marker id="arrow-muted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#9FB0C5"/>
    </marker>
    <style>
      .title { font: 700 42px Inter, Segoe UI, Arial, sans-serif; fill: #E8EEF7; }
      .subtitle { font: 400 19px Inter, Segoe UI, Arial, sans-serif; fill: #9FB0C5; }
      .section { font: 700 22px Inter, Segoe UI, Arial, sans-serif; fill: #E8EEF7; }
      .label { font: 650 20px Inter, Segoe UI, Arial, sans-serif; fill: #E8EEF7; }
      .small { font: 400 16px Inter, Segoe UI, Arial, sans-serif; fill: #9FB0C5; }
      .tiny { font: 500 14px Inter, Segoe UI, Arial, sans-serif; fill: #9FB0C5; }
      .box { fill: #111B2E; stroke: #22324A; stroke-width: 2; rx: 22; }
      .box2 { fill: #16243A; stroke: #22324A; stroke-width: 2; rx: 18; }
      .accent-box { fill: #111B2E; stroke: #38D6C6; stroke-width: 3; rx: 22; }
      .line { fill: none; stroke: #38D6C6; stroke-width: 4; marker-end: url(#arrow); }
      .line-muted { fill: none; stroke: #9FB0C5; stroke-width: 3; marker-end: url(#arrow-muted); }
      .dash { fill: none; stroke: #38D6C6; stroke-width: 3; stroke-dasharray: 10 10; marker-end: url(#arrow); }
      .node { fill: #38D6C6; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#0B1220"/>
  <text x="80" y="80" class="title">Écosystème Ohanna</text>
  <text x="80" y="118" class="subtitle">Produits, responsabilités et relations de référence.</text>
<rect x="560" y="180" width="480" height="140" class="accent-box" filter="url(#shadow)"/><text x="800.0" y="224" text-anchor="middle" class="label">Ohanna Platform</text><text x="800.0" y="255" text-anchor="middle" class="small">Architecture · Documentation · Déploiement</text><rect x="180" y="450" width="360" height="170" class="box" filter="url(#shadow)"/><text x="360.0" y="494" text-anchor="middle" class="label">Ohanna Agent</text><text x="360.0" y="525" text-anchor="middle" class="small">Observation</text><text x="360.0" y="548" text-anchor="middle" class="small">Plugins · Runtime · Export</text><rect x="620" y="450" width="360" height="170" class="box" filter="url(#shadow)"/><text x="800.0" y="494" text-anchor="middle" class="label">Ohanna Vision</text><text x="800.0" y="525" text-anchor="middle" class="small">Visualisation</text><text x="800.0" y="548" text-anchor="middle" class="small">Timeline · Santé · Topologie</text><rect x="1060" y="450" width="360" height="170" class="box" filter="url(#shadow)"/><text x="1240.0" y="494" text-anchor="middle" class="label">Ohanna House</text><text x="1240.0" y="525" text-anchor="middle" class="small">Déploiement de référence</text><text x="1240.0" y="548" text-anchor="middle" class="small">Infrastructure réelle</text><path d="M800 320 V390 H360 V450" class="line"/><path d="M800 390 H800 V450" class="line"/><path d="M800 390 H1240 V450" class="line"/><path d="M540 535 H620" class="dash"/><path d="M980 535 H1060" class="dash"/>
      <line x1="80" y1="842" x2="1520" y2="842" stroke="#22324A" stroke-width="2"/>
      <text x="80" y="874" class="tiny">Ohanna Platform · Architecture de référence</text>
      <text x="1520" y="874" text-anchor="end" class="tiny">Version 1.0</text>
    </svg>
    