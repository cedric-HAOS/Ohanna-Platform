<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Flux d’observation</title>
  <desc id="desc">Du contrôle d’une capacité jusqu’à sa visualisation.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#38D6C6"/>
    </marker>
    <marker id="arrow-muted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#9FB0C5"/>
    </marker>
    <style>
      .title { font: 700 42px Inter, Segoe UI, Arial, sans-serif; fill: #E8EEF7; }
      .subtitle { font: 400 19px Inter, Segoe UI, Arial, sans-serif; fill: #9FB0C5; }
      .section { font: 700 22px Inter, Segoe UI, Arial, sans-serif; fill: #E8EEF7; }
      .label { font: 650 20px Inter, Segoe UI, Arial, sans-serif; fill: #E8EEF7; }
      .small { font: 400 16px Inter, Segoe UI, Arial, sans-serif; fill: #9FB0C5; }
      .tiny { font: 500 14px Inter, Segoe UI, Arial, sans-serif; fill: #9FB0C5; }
      .box { fill: #111B2E; stroke: #22324A; stroke-width: 2; rx: 22; }
      .box2 { fill: #16243A; stroke: #22324A; stroke-width: 2; rx: 18; }
      .accent-box { fill: #111B2E; stroke: #38D6C6; stroke-width: 3; rx: 22; }
      .line { fill: none; stroke: #38D6C6; stroke-width: 4; marker-end: url(#arrow); }
      .line-muted { fill: none; stroke: #9FB0C5; stroke-width: 3; marker-end: url(#arrow-muted); }
      .dash { fill: none; stroke: #38D6C6; stroke-width: 3; stroke-dasharray: 10 10; marker-end: url(#arrow); }
      .node { fill: #38D6C6; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#0B1220"/>
  <text x="80" y="80" class="title">Flux d’observation</text>
  <text x="80" y="118" class="subtitle">Du contrôle d’une capacité jusqu’à sa visualisation.</text>
<rect x="110" y="360" width="240" height="150" class="box" filter="url(#shadow)"/><text x="230.0" y="404" text-anchor="middle" class="label">Capacité</text><text x="230.0" y="435" text-anchor="middle" class="small">Exécute un contrôle</text><rect x="390" y="360" width="240" height="150" class="box" filter="url(#shadow)"/><text x="510.0" y="404" text-anchor="middle" class="label">Plugin</text><text x="510.0" y="435" text-anchor="middle" class="small">Produit une observation</text><rect x="670" y="360" width="240" height="150" class="accent-box" filter="url(#shadow)"/><text x="790.0" y="404" text-anchor="middle" class="label">Agent</text><text x="790.0" y="435" text-anchor="middle" class="small">Valide et publie</text><rect x="950" y="360" width="240" height="150" class="box" filter="url(#shadow)"/><text x="1070.0" y="404" text-anchor="middle" class="label">Interface</text><text x="1070.0" y="435" text-anchor="middle" class="small">Expose les données</text><rect x="1230" y="360" width="240" height="150" class="box" filter="url(#shadow)"/><text x="1350.0" y="404" text-anchor="middle" class="label">Vision</text><text x="1350.0" y="435" text-anchor="middle" class="small">Présente l’état</text><path d="M350 435 H390" class="line"/><path d="M630 435 H670" class="line"/><path d="M910 435 H950" class="line"/><path d="M1190 435 H1230" class="line"/><text x="800" y="610" text-anchor="middle" class="section">Observation immuable et traçable de bout en bout</text><text x="800" y="650" text-anchor="middle" class="small">La donnée d’origine n’est jamais modifiée après publication.</text>
      <line x1="80" y1="842" x2="1520" y2="842" stroke="#22324A" stroke-width="2"/>
      <text x="80" y="874" class="tiny">Ohanna Platform · Architecture de référence</text>
      <text x="1520" y="874" text-anchor="end" class="tiny">Version 1.0</text>
    </svg>
    