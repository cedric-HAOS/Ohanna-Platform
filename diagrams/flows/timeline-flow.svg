<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Flux de chronologie</title>
  <desc id="desc">Transformation des observations en périodes d’état métier.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#38D6C6"/>
    </marker>
    <marker id="arrow-muted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#9FB0C5"/>
    </marker>
    <style>
      .title { font: 700 42px Inter, Segoe UI, Arial, sans-serif; fill: #E8EEF7; }
      .subtitle { font: 400 19px Inter, Segoe UI, Arial, sans-serif; fill: #9FB0C5; }
      .section { font: 700 22px Inter, Segoe UI, Arial, sans-serif; fill: #E8EEF7; }
      .label { font: 650 20px Inter, Segoe UI, Arial, sans-serif; fill: #E8EEF7; }
      .small { font: 400 16px Inter, Segoe UI, Arial, sans-serif; fill: #9FB0C5; }
      .tiny { font: 500 14px Inter, Segoe UI, Arial, sans-serif; fill: #9FB0C5; }
      .box { fill: #111B2E; stroke: #22324A; stroke-width: 2; rx: 22; }
      .box2 { fill: #16243A; stroke: #22324A; stroke-width: 2; rx: 18; }
      .accent-box { fill: #111B2E; stroke: #38D6C6; stroke-width: 3; rx: 22; }
      .line { fill: none; stroke: #38D6C6; stroke-width: 4; marker-end: url(#arrow); }
      .line-muted { fill: none; stroke: #9FB0C5; stroke-width: 3; marker-end: url(#arrow-muted); }
      .dash { fill: none; stroke: #38D6C6; stroke-width: 3; stroke-dasharray: 10 10; marker-end: url(#arrow); }
      .node { fill: #38D6C6; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#0B1220"/>
  <text x="80" y="80" class="title">Flux de chronologie</text>
  <text x="80" y="118" class="subtitle">Transformation des observations en périodes d’état métier.</text>
<rect x="120" y="360" width="280" height="160" class="box" filter="url(#shadow)"/><text x="260.0" y="404" text-anchor="middle" class="label">Observations</text><text x="260.0" y="435" text-anchor="middle" class="small">Suite chronologique</text><text x="260.0" y="458" text-anchor="middle" class="small">d’états</text><rect x="520" y="330" width="320" height="220" class="accent-box" filter="url(#shadow)"/><text x="680.0" y="374" text-anchor="middle" class="label">Timeline Engine</text><text x="680.0" y="405" text-anchor="middle" class="small">Ouvre · prolonge · ferme</text><text x="680.0" y="428" text-anchor="middle" class="small">les périodes métier</text><rect x="960" y="360" width="280" height="160" class="box" filter="url(#shadow)"/><text x="1100.0" y="404" text-anchor="middle" class="label">Périodes d’état</text><text x="1100.0" y="435" text-anchor="middle" class="small">Début · fin · statut</text><rect x="1320" y="360" width="220" height="160" class="box" filter="url(#shadow)"/><text x="1430.0" y="404" text-anchor="middle" class="label">Timeline UI</text><text x="1430.0" y="435" text-anchor="middle" class="small">Historique</text><text x="1430.0" y="458" text-anchor="middle" class="small">lisible</text><path d="M400 440 H520" class="line"/><path d="M840 440 H960" class="line"/><path d="M1240 440 H1320" class="line"/><line x1="250" y1="650" x2="1370" y2="650" stroke="#22324A" stroke-width="8" stroke-linecap="round"/><circle cx="360" cy="650" r="14" fill="#38D6C6"/><text x="360" y="690" text-anchor="middle" class="small">Healthy</text><circle cx="660" cy="650" r="14" fill="#F4C95D"/><text x="660" y="690" text-anchor="middle" class="small">Degraded</text><circle cx="920" cy="650" r="14" fill="#F47C7C"/><text x="920" y="690" text-anchor="middle" class="small">Unavailable</text><circle cx="1190" cy="650" r="14" fill="#38D6C6"/><text x="1190" y="690" text-anchor="middle" class="small">Healthy</text>
      <line x1="80" y1="842" x2="1520" y2="842" stroke="#22324A" stroke-width="2"/>
      <text x="80" y="874" class="tiny">Ohanna Platform · Architecture de référence</text>
      <text x="1520" y="874" text-anchor="end" class="tiny">Version 1.0</text>
    </svg>
    