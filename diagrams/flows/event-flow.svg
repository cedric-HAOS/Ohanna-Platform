<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Flux d’événements</title>
  <desc id="desc">Propagation interne des changements sans dépendances directes.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#38D6C6"/>
    </marker>
    <marker id="arrow-muted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#9FB0C5"/>
    </marker>
    <style>
      .title { font: 700 42px Inter, Segoe UI, Arial, sans-serif; fill: #E8EEF7; }
      .subtitle { font: 400 19px Inter, Segoe UI, Arial, sans-serif; fill: #9FB0C5; }
      .section { font: 700 22px Inter, Segoe UI, Arial, sans-serif; fill: #E8EEF7; }
      .label { font: 650 20px Inter, Segoe UI, Arial, sans-serif; fill: #E8EEF7; }
      .small { font: 400 16px Inter, Segoe UI, Arial, sans-serif; fill: #9FB0C5; }
      .tiny { font: 500 14px Inter, Segoe UI, Arial, sans-serif; fill: #9FB0C5; }
      .box { fill: #111B2E; stroke: #22324A; stroke-width: 2; rx: 22; }
      .box2 { fill: #16243A; stroke: #22324A; stroke-width: 2; rx: 18; }
      .accent-box { fill: #111B2E; stroke: #38D6C6; stroke-width: 3; rx: 22; }
      .line { fill: none; stroke: #38D6C6; stroke-width: 4; marker-end: url(#arrow); }
      .line-muted { fill: none; stroke: #9FB0C5; stroke-width: 3; marker-end: url(#arrow-muted); }
      .dash { fill: none; stroke: #38D6C6; stroke-width: 3; stroke-dasharray: 10 10; marker-end: url(#arrow); }
      .node { fill: #38D6C6; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#0B1220"/>
  <text x="80" y="80" class="title">Flux d’événements</text>
  <text x="80" y="118" class="subtitle">Propagation interne des changements sans dépendances directes.</text>
<rect x="140" y="330" width="310" height="160" class="box" filter="url(#shadow)"/><text x="295.0" y="374" text-anchor="middle" class="label">Producteurs</text><text x="295.0" y="405" text-anchor="middle" class="small">Scheduler · Plugins · Runtime</text><rect x="645" y="300" width="310" height="220" class="accent-box" filter="url(#shadow)"/><text x="800.0" y="344" text-anchor="middle" class="label">Event Bus</text><text x="800.0" y="375" text-anchor="middle" class="small">Distribution découplée</text><text x="800.0" y="398" text-anchor="middle" class="small">Abonnements explicites</text><rect x="1150" y="210" width="300" height="130" class="box" filter="url(#shadow)"/><text x="1300.0" y="254" text-anchor="middle" class="label">Moteurs</text><text x="1300.0" y="285" text-anchor="middle" class="small">Santé · Timeline</text><rect x="1150" y="385" width="300" height="130" class="box" filter="url(#shadow)"/><text x="1300.0" y="429" text-anchor="middle" class="label">Exportateurs</text><text x="1300.0" y="460" text-anchor="middle" class="small">REST · WebSocket · MQTT</text><rect x="1150" y="560" width="300" height="130" class="box" filter="url(#shadow)"/><text x="1300.0" y="604" text-anchor="middle" class="label">Journalisation</text><text x="1300.0" y="635" text-anchor="middle" class="small">Audit · Diagnostic</text><path d="M450 410 H645" class="line"/><path d="M955 370 C1040 370 1055 275 1150 275" class="line"/><path d="M955 410 H1150" class="line"/><path d="M955 450 C1040 450 1055 625 1150 625" class="line"/>
      <line x1="80" y1="842" x2="1520" y2="842" stroke="#22324A" stroke-width="2"/>
      <text x="80" y="874" class="tiny">Ohanna Platform · Architecture de référence</text>
      <text x="1520" y="874" text-anchor="end" class="tiny">Version 1.0</text>
    </svg>
    