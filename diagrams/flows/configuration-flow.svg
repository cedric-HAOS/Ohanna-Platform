<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Flux de configuration</title>
  <desc id="desc">De l’intention déclarative au comportement effectif des composants.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#38D6C6"/>
    </marker>
    <marker id="arrow-muted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#9FB0C5"/>
    </marker>
    <style>
      .title { font: 700 42px Inter, Segoe UI, Arial, sans-serif; fill: #E8EEF7; }
      .subtitle { font: 400 19px Inter, Segoe UI, Arial, sans-serif; fill: #9FB0C5; }
      .section { font: 700 22px Inter, Segoe UI, Arial, sans-serif; fill: #E8EEF7; }
      .label { font: 650 20px Inter, Segoe UI, Arial, sans-serif; fill: #E8EEF7; }
      .small { font: 400 16px Inter, Segoe UI, Arial, sans-serif; fill: #9FB0C5; }
      .tiny { font: 500 14px Inter, Segoe UI, Arial, sans-serif; fill: #9FB0C5; }
      .box { fill: #111B2E; stroke: #22324A; stroke-width: 2; rx: 22; }
      .box2 { fill: #16243A; stroke: #22324A; stroke-width: 2; rx: 18; }
      .accent-box { fill: #111B2E; stroke: #38D6C6; stroke-width: 3; rx: 22; }
      .line { fill: none; stroke: #38D6C6; stroke-width: 4; marker-end: url(#arrow); }
      .line-muted { fill: none; stroke: #9FB0C5; stroke-width: 3; marker-end: url(#arrow-muted); }
      .dash { fill: none; stroke: #38D6C6; stroke-width: 3; stroke-dasharray: 10 10; marker-end: url(#arrow); }
      .node { fill: #38D6C6; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#0B1220"/>
  <text x="80" y="80" class="title">Flux de configuration</text>
  <text x="80" y="118" class="subtitle">De l’intention déclarative au comportement effectif des composants.</text>
<rect x="100" y="350" width="300" height="180" class="box" filter="url(#shadow)"/><text x="250.0" y="394" text-anchor="middle" class="label">Configuration déclarative</text><text x="250.0" y="425" text-anchor="middle" class="small">Infrastructure · Services</text><text x="250.0" y="448" text-anchor="middle" class="small">Capacités · Plugins</text><rect x="560" y="330" width="320" height="220" class="accent-box" filter="url(#shadow)"/><text x="720.0" y="374" text-anchor="middle" class="label">Chargement et validation</text><text x="720.0" y="405" text-anchor="middle" class="small">Schémas · Cohérence</text><text x="720.0" y="428" text-anchor="middle" class="small">Valeurs par défaut</text><rect x="1040" y="220" width="300" height="145" class="box" filter="url(#shadow)"/><text x="1190.0" y="264" text-anchor="middle" class="label">Runtime Agent</text><text x="1190.0" y="295" text-anchor="middle" class="small">Planification et exécution</text><rect x="1040" y="420" width="300" height="145" class="box" filter="url(#shadow)"/><text x="1190.0" y="464" text-anchor="middle" class="label">Vision</text><text x="1190.0" y="495" text-anchor="middle" class="small">Présentation et préférences</text><rect x="1040" y="620" width="300" height="145" class="box" filter="url(#shadow)"/><text x="1190.0" y="664" text-anchor="middle" class="label">Déploiement</text><text x="1190.0" y="695" text-anchor="middle" class="small">Environnements et chemins</text><path d="M400 440 H560" class="line"/><path d="M880 380 C960 380 965 292 1040 292" class="line"/><path d="M880 440 H1040" class="line"/><path d="M880 500 C960 500 965 692 1040 692" class="line"/>
