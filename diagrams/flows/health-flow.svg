<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Flux de santé</title>
  <desc id="desc">Calcul et agrégation de la santé de l’infrastructure.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#38D6C6"/>
    </marker>
    <marker id="arrow-muted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#9FB0C5"/>
    </marker>
    <style>
      .title { font: 700 42px Inter, Segoe UI, Arial, sans-serif; fill: #E8EEF7; }
      .subtitle { font: 400 19px Inter, Segoe UI, Arial, sans-serif; fill: #9FB0C5; }
      .section { font: 700 22px Inter, Segoe UI, Arial, sans-serif; fill: #E8EEF7; }
      .label { font: 650 20px Inter, Segoe UI, Arial, sans-serif; fill: #E8EEF7; }
      .small { font: 400 16px Inter, Segoe UI, Arial, sans-serif; fill: #9FB0C5; }
      .tiny { font: 500 14px Inter, Segoe UI, Arial, sans-serif; fill: #9FB0C5; }
      .box { fill: #111B2E; stroke: #22324A; stroke-width: 2; rx: 22; }
      .box2 { fill: #16243A; stroke: #22324A; stroke-width: 2; rx: 18; }
      .accent-box { fill: #111B2E; stroke: #38D6C6; stroke-width: 3; rx: 22; }
      .line { fill: none; stroke: #38D6C6; stroke-width: 4; marker-end: url(#arrow); }
      .line-muted { fill: none; stroke: #9FB0C5; stroke-width: 3; marker-end: url(#arrow-muted); }
      .dash { fill: none; stroke: #38D6C6; stroke-width: 3; stroke-dasharray: 10 10; marker-end: url(#arrow); }
      .node { fill: #38D6C6; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#0B1220"/>
  <text x="80" y="80" class="title">Flux de santé</text>
  <text x="80" y="118" class="subtitle">Calcul et agrégation de la santé de l’infrastructure.</text>
<rect x="130" y="350" width="300" height="160" class="box" filter="url(#shadow)"/><text x="280.0" y="394" text-anchor="middle" class="label">Observations</text><text x="280.0" y="425" text-anchor="middle" class="small">États unitaires</text><text x="280.0" y="448" text-anchor="middle" class="small">Latence · Métadonnées</text><rect x="650" y="330" width="300" height="200" class="accent-box" filter="url(#shadow)"/><text x="800.0" y="374" text-anchor="middle" class="label">Health Engine</text><text x="800.0" y="405" text-anchor="middle" class="small">Évalue et agrège</text><text x="800.0" y="428" text-anchor="middle" class="small">les niveaux de santé</text><rect x="1170" y="220" width="300" height="140" class="box" filter="url(#shadow)"/><text x="1320.0" y="264" text-anchor="middle" class="label">Capacité</text><text x="1320.0" y="295" text-anchor="middle" class="small">État fonctionnel</text><rect x="1170" y="400" width="300" height="140" class="box" filter="url(#shadow)"/><text x="1320.0" y="444" text-anchor="middle" class="label">Service / Nœud</text><text x="1320.0" y="475" text-anchor="middle" class="small">État agrégé</text><rect x="1170" y="580" width="300" height="140" class="box" filter="url(#shadow)"/><text x="1320.0" y="624" text-anchor="middle" class="label">Infrastructure</text><text x="1320.0" y="655" text-anchor="middle" class="small">Santé globale</text><path d="M430 430 H650" class="line"/><path d="M950 380 C1050 380 1060 290 1170 290" class="line"/><path d="M950 430 H1170" class="line"/><path d="M950 480 C1050 480 1060 650 1170 650" class="line"/>
