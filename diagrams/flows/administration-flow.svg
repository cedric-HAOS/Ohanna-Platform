<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Flux d’administration</title>
  <desc id="desc">Exécution contrôlée, traçable et observable des commandes.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#38D6C6"/>
    </marker>
    <marker id="arrow-muted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#9FB0C5"/>
    </marker>
    <style>
      .title { font: 700 42px Inter, Segoe UI, Arial, sans-serif; fill: #E8EEF7; }
      .subtitle { font: 400 19px Inter, Segoe UI, Arial, sans-serif; fill: #9FB0C5; }
      .section { font: 700 22px Inter, Segoe UI, Arial, sans-serif; fill: #E8EEF7; }
      .label { font: 650 20px Inter, Segoe UI, Arial, sans-serif; fill: #E8EEF7; }
      .small { font: 400 16px Inter, Segoe UI, Arial, sans-serif; fill: #9FB0C5; }
      .tiny { font: 500 14px Inter, Segoe UI, Arial, sans-serif; fill: #9FB0C5; }
      .box { fill: #111B2E; stroke: #22324A; stroke-width: 2; rx: 22; }
      .box2 { fill: #16243A; stroke: #22324A; stroke-width: 2; rx: 18; }
      .accent-box { fill: #111B2E; stroke: #38D6C6; stroke-width: 3; rx: 22; }
      .line { fill: none; stroke: #38D6C6; stroke-width: 4; marker-end: url(#arrow); }
      .line-muted { fill: none; stroke: #9FB0C5; stroke-width: 3; marker-end: url(#arrow-muted); }
      .dash { fill: none; stroke: #38D6C6; stroke-width: 3; stroke-dasharray: 10 10; marker-end: url(#arrow); }
      .node { fill: #38D6C6; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#0B1220"/>
  <text x="80" y="80" class="title">Flux d’administration</text>
  <text x="80" y="118" class="subtitle">Exécution contrôlée, traçable et observable des commandes.</text>
<rect x="100" y="350" width="270" height="170" class="box" filter="url(#shadow)"/><text x="235.0" y="394" text-anchor="middle" class="label">Administrateur</text><text x="235.0" y="425" text-anchor="middle" class="small">Demande une opération</text><rect x="480" y="330" width="300" height="210" class="accent-box" filter="url(#shadow)"/><text x="630.0" y="374" text-anchor="middle" class="label">Interface d’administration</text><text x="630.0" y="405" text-anchor="middle" class="small">Valide · Autorise</text><text x="630.0" y="428" text-anchor="middle" class="small">Trace la demande</text><rect x="900" y="350" width="280" height="170" class="box" filter="url(#shadow)"/><text x="1040.0" y="394" text-anchor="middle" class="label">Runtime</text><text x="1040.0" y="425" text-anchor="middle" class="small">Exécute la commande</text><rect x="1290" y="250" width="230" height="140" class="box" filter="url(#shadow)"/><text x="1405.0" y="294" text-anchor="middle" class="label">Configuration</text><text x="1405.0" y="325" text-anchor="middle" class="small">Mise à jour contrôlée</text><rect x="1290" y="480" width="230" height="140" class="box" filter="url(#shadow)"/><text x="1405.0" y="524" text-anchor="middle" class="label">Observation</text><text x="1405.0" y="555" text-anchor="middle" class="small">Résultat observable</text><path d="M370 435 H480" class="line"/><path d="M780 435 H900" class="line"/><path d="M1180 400 C1240 400 1240 320 1290 320" class="line"/><path d="M1180 470 C1240 470 1240 550 1290 550" class="line"/><path d="M1405 620 C1405 735 235 735 235 520" class="dash"/>
      <line x1="80" y1="842" x2="1520" y2="842" stroke="#22324A" stroke-width="2"/>
      <text x="80" y="874" class="tiny">Ohanna Platform · Architecture de référence</text>
      <text x="1520" y="874" text-anchor="end" class="tiny">Version 1.0</text>
    </svg>
    