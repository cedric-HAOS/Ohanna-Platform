<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Flux de visualisation</title>
  <desc id="desc">Transformation contrôlée des données en vues utilisateur.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#38D6C6"/>
    </marker>
    <marker id="arrow-muted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#9FB0C5"/>
    </marker>
    <style>
      .title { font: 700 42px Inter, Segoe UI, Arial, sans-serif; fill: #E8EEF7; }
      .subtitle { font: 400 19px Inter, Segoe UI, Arial, sans-serif; fill: #9FB0C5; }
      .section { font: 700 22px Inter, Segoe UI, Arial, sans-serif; fill: #E8EEF7; }
      .label { font: 650 20px Inter, Segoe UI, Arial, sans-serif; fill: #E8EEF7; }
      .small { font: 400 16px Inter, Segoe UI, Arial, sans-serif; fill: #9FB0C5; }
      .tiny { font: 500 14px Inter, Segoe UI, Arial, sans-serif; fill: #9FB0C5; }
      .box { fill: #111B2E; stroke: #22324A; stroke-width: 2; rx: 22; }
      .box2 { fill: #16243A; stroke: #22324A; stroke-width: 2; rx: 18; }
      .accent-box { fill: #111B2E; stroke: #38D6C6; stroke-width: 3; rx: 22; }
      .line { fill: none; stroke: #38D6C6; stroke-width: 4; marker-end: url(#arrow); }
      .line-muted { fill: none; stroke: #9FB0C5; stroke-width: 3; marker-end: url(#arrow-muted); }
      .dash { fill: none; stroke: #38D6C6; stroke-width: 3; stroke-dasharray: 10 10; marker-end: url(#arrow); }
      .node { fill: #38D6C6; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#0B1220"/>
  <text x="80" y="80" class="title">Flux de visualisation</text>
  <text x="80" y="118" class="subtitle">Transformation contrôlée des données en vues utilisateur.</text>
<rect x="100" y="350" width="280" height="170" class="box" filter="url(#shadow)"/><text x="240.0" y="394" text-anchor="middle" class="label">API Ohana Vision</text><text x="240.0" y="425" text-anchor="middle" class="small">Runtime · Observations</text><text x="240.0" y="448" text-anchor="middle" class="small">Timeline · Topologie</text><rect x="500" y="330" width="300" height="210" class="accent-box" filter="url(#shadow)"/><text x="650.0" y="374" text-anchor="middle" class="label">Projection</text><text x="650.0" y="405" text-anchor="middle" class="small">Adapte les données</text><text x="650.0" y="428" text-anchor="middle" class="small">sans altérer la source</text><rect x="920" y="210" width="280" height="135" class="box" filter="url(#shadow)"/><text x="1060.0" y="254" text-anchor="middle" class="label">Vue d’ensemble</text><text x="1060.0" y="285" text-anchor="middle" class="small">KPI · Santé globale</text><rect x="920" y="390" width="280" height="135" class="box" filter="url(#shadow)"/><text x="1060.0" y="434" text-anchor="middle" class="label">Infrastructure</text><text x="1060.0" y="465" text-anchor="middle" class="small">Carte · Topologie</text><rect x="920" y="570" width="280" height="135" class="box" filter="url(#shadow)"/><text x="1060.0" y="614" text-anchor="middle" class="label">Historique</text><text x="1060.0" y="645" text-anchor="middle" class="small">Timeline · Observations</text><rect x="1320" y="390" width="220" height="135" class="box" filter="url(#shadow)"/><text x="1430.0" y="434" text-anchor="middle" class="label">Utilisateur</text><text x="1430.0" y="465" text-anchor="middle" class="small">Comprendre</text><text x="1430.0" y="488" text-anchor="middle" class="small">et décider</text><path d="M380 435 H500" class="line"/><path d="M800 380 C850 380 865 278 920 278" class="line"/><path d="M800 435 H920" class="line"/><path d="M800 490 C850 490 865 638 920 638" class="line"/><path d="M1200 278 C1275 278 1270 435 1320 435" class="line-muted"/><path d="M1200 458 H1320" class="line"/><path d="M1200 638 C1275 638 1270 490 1320 490" class="line-muted"/>
      <line x1="80" y1="842" x2="1520" y2="842" stroke="#22324A" stroke-width="2"/>
      <text x="80" y="874" class="tiny">Ohana Platform · Architecture de référence</text>
      <text x="1520" y="874" text-anchor="end" class="tiny">Version 1.0</text>
    </svg>
    