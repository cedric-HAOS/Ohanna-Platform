schema_version: 1

platform:
  name: Ohana
  version: "1.0.3"

runtime:
  python:
    minimum_version: "3.13"

components:
  agent:
    name: Ohana-Agent
    repository: cedric-HAOS/Ohana-Agent
    version: "1.2.0"
    release_tag: v1.2.0

    package:
      type: wheel
      filename: ohana_agent-1.2.0-py3-none-any.whl

    configuration:
      directory: /etc/ohana-agent
      files:
        - source: shikamaru.example.yaml
          destination: shikamaru.yaml

        - source: infrastructure.example.yaml
          destination: infrastructure.yaml

        - source: dns.example.yaml
          destination: plugins/dns.yaml

    service:
      filename: ohana-agent.service
      description: Ohana Agent
      user: ohana-agent
      group: ohana-agent
      working_directory: /opt/ohana-agent
      executable: /opt/ohana-agent/venv/bin/ohana-agent
      arguments:
        - --config
        - /etc/ohana-agent/shikamaru.yaml
        - --infrastructure
        - /etc/ohana-agent/infrastructure.yaml
        - --dns-config
        - /etc/ohana-agent/plugins/dns.yaml

  vision:
    name: Ohana-Vision
    repository: cedric-HAOS/Ohana-Vision
    version: "1.2.0"
    release_tag: v1.2.0

    package:
      type: wheel
      filename: ohana_vision-1.2.0-py3-none-any.whl

    configuration:
      directory: /etc/ohana-vision
      files:
        - source: vision.example.yaml
          destination: vision.yaml

    service:
      filename: ohana-vision.service
      description: Ohana Vision
      user: ohana-vision
      group: ohana-vision
      working_directory: /opt/ohana-vision
      executable: /opt/ohana-vision/venv/bin/ohana-vision
      arguments:
        - --config
        - /etc/ohana-vision/vision.yaml

compatibility:
  operating_system:
    family: Linux
    service_manager: systemd
