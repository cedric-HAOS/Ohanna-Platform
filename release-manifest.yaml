schema_version: 1

platform:
  name: Ohanna
  version: "1.0.0"

runtime:
  python:
    minimum_version: "3.12"

components:
  agent:
    name: Ohanna-Agent
    repository: cedric-HAOS/Ohanna-Agent
    version: "1.1.0"
    release_tag: v1.1.0

    package:
      type: wheel
      filename: ohanna_agent-1.1.0-py3-none-any.whl

    configuration:
      directory: /etc/ohanna-agent
      files:
        - source: shikamaru.example.yaml
          destination: shikamaru.yaml

        - source: infrastructure.example.yaml
          destination: infrastructure.yaml

        - source: dns.example.yaml
          destination: plugins/dns.yaml

    service:
      filename: ohanna-agent.service
      description: Ohanna Agent
      user: ohanna
      group: ohanna
      working_directory: /opt/ohanna-agent
      executable: /opt/ohanna-agent/venv/bin/ohanna-agent
      arguments:
        - --config
        - /etc/ohanna-agent/shikamaru.yaml
        - --infrastructure
        - /etc/ohanna-agent/infrastructure.yaml
        - --dns-config
        - /etc/ohanna-agent/plugins/dns.yaml

  vision:
    name: Ohanna-Vision
    repository: cedric-HAOS/Ohanna-Vision
    version: "1.1.0"
    release_tag: v1.1.0

    package:
      type: wheel
      filename: ohanna_vision-1.1.0-py3-none-any.whl

    configuration:
      directory: /etc/ohanna-vision
      files:
        - source: vision.example.yaml
          destination: vision.yaml

    service:
      filename: ohanna-vision.service
      description: Ohanna Vision
      user: ohanna
      group: ohanna
      working_directory: /opt/ohanna-vision
      executable: /opt/ohanna-vision/venv/bin/ohanna-vision
      arguments:
        - --config
        - /etc/ohanna-vision/vision.yaml

compatibility:
  operating_system:
    family: Linux
    service_manager: systemd
